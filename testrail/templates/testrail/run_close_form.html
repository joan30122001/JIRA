<!DOCTYPE html>
<html>
<head>
    <title>Close Run</title>
</head>
<body>
    <h1>Close Run {{ run_id }}</h1>

    {% if success %}<p style="color:green;">{{ success }}</p>{% endif %}
    {% if error %}<p style="color:red;">{{ error }}</p>{% endif %}

    <form method="post" action="{{ action_url }}">
        {% csrf_token %}
        <button type="submit">Close Run</button>
    </form>

    {% if result %}<pre>{{ result }}</pre>{% endif %}
</body>
</html>
