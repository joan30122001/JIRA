<!DOCTYPE html>
<html>
<head>
    <title>Update Case</title>
</head>
<body>
    <h1>Update Case {{ case_id }}</h1>

    {% if success %}<p style="color:green;">{{ success }}</p>{% endif %}
    {% if error %}<p style="color:red;">{{ error }}</p>{% endif %}

    <form method="post" action="{{ action_url }}">
        {% csrf_token %}
        <p><input type="text" name="title" placeholder="New title"></p>
        <p><textarea name="steps" placeholder="Steps"></textarea></p>
        <p><textarea name="expected" placeholder="Expected"></textarea></p>
        <p><input type="text" name="refs" placeholder="Refs"></p>
        <p><input type="number" name="priority_id" placeholder="Priority ID"></p>
        <button type="submit">Update Case</button>
    </form>

    {% if result %}<pre>{{ result }}</pre>{% endif %}
</body>
</html>
